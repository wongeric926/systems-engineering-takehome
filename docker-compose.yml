services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  payments:
    build: ./services/payments
    environment:
      # Flaky on purpose. Treat this like a third-party provider you don't control.
      - FAILURE_RATE=0.3   # fraction of /charge calls that return 500
      - SLOW_RATE=0.1      # fraction of /charge calls that hang for SLOW_SECONDS
      - SLOW_SECONDS=5
    ports:
      - "8001:8001"

  producer:
    build: ./services/producer
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./services/worker
    environment:
      - REDIS_URL=redis://redis:6379
      - PAYMENTS_URL=http://payments:8001
    # Defence in depth: if the process ever dies, bring it back. Un-acked in-flight
    # orders sit in the consumer group's pending list and are re-processed on restart,
    # so a crash can't lose an order. Correctness does not *depend* on this, but there's
    # no reason to stay down.
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      payments:
        condition: service_started
